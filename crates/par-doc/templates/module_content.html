<section class="item-list">
  {% if has_module_doc %}
    <div class="module-doc prose">
      {{ module_doc_html|safe }}
    </div>
  {% endif %}

  {% if is_empty %}
    <p class="empty-note">No documented items.</p>
  {% endif %}

  {% for item in items %}
    <article class="item-card"{% if item.include_id %} id="{{ item.anchor }}"{% endif %}>
      <div class="item-head">
        <pre class="signature">{{ item.signature_html|safe }}</pre>
        {% if item.is_unexported %}
          <span class="lock-chip" title="Unexported">&#x1F512;</span>
        {% endif %}
      </div>

      {% if item.has_doc %}
        <div class="item-doc prose">
          {{ item.doc_html|safe }}
        </div>
      {% endif %}
    </article>
  {% endfor %}
</section>
